server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: finpilot-ai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finpilot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:9345568849}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

# Security & JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: 86400000 # 24 hours

# AI API Configurations
ai:
  groq:
    api-key: ${GROQ_API_KEY:mock-key}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    base-url: https://api.groq.com/openai/v1
